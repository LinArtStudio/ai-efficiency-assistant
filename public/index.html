<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI工具箱 - 让每个人都用得起AI</title>
    <meta name="description" content="AI求职工具和AI办公效率工具，帮你提升职场竞争力">
    <meta name="keywords" content="AI工具,求职,AI办公,效率工具,周报">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
        }
        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
            margin-bottom: 3rem;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .card-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .card h2 {
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .card p {
            color: #666;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        .card a {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: opacity 0.3s ease;
        }
        .card a:hover {
            opacity: 0.9;
        }
        .footer {
            color: rgba(255,255,255,0.7);
            margin-top: 3rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AI工具箱</h1>
        <p class="subtitle">让每个人都用得起AI</p>
        
        <div class="cards">
            <div class="card">
                <div class="card-icon">💼</div>
                <h2>AI求职工具</h2>
                <p>简历诊断、模拟面试、职业规划，帮你找到理想工作</p>
                <a href="/ai-career/">立即使用 →</a>
            </div>
            
            <div class="card">
                <div class="card-icon">⚡</div>
                <h2>AI办公效率</h2>
                <p>周报、会议纪要、邮件、润色、翻译，3分钟搞定</p>
                <a href="/efficiency/">立即使用 →</a>
            </div>
        </div>
        
        <p class="footer">© 2026 AI工具箱 - 让每个人都用得起AI</p>
    </div>
</body>
</html>
